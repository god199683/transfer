<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Narou Novel Translator</title>
    <meta
      name="description"
      content="Long Japanese web novel translator for Narou and pasted text"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M5 4h14" />
              <path d="M12 4v16" />
              <path d="M8 9h8" />
              <path d="M7 14h10" />
              <path d="M5 20h14" />
            </svg>
          </div>
          <div>
            <h1>나로우 장문 번역기</h1>
            <p>Azure Translator F0 · 월 200만 자 무료 · 일본어 웹소설용</p>
          </div>
        </div>
        <div class="status-pill" aria-live="polite">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">대기</span>
        </div>
      </header>

      <section class="settings-panel" aria-label="번역 설정">
        <label class="field">
          <span>API</span>
          <select id="providerInput">
            <option value="azure">Azure 추천</option>
            <option value="mymemory">MyMemory 예비</option>
            <option value="libretranslate">LibreTranslate</option>
          </select>
        </label>

        <label class="field endpoint-field">
          <span id="endpointLabel">Worker URL</span>
          <input
            id="endpointInput"
            type="url"
            autocomplete="off"
            spellcheck="false"
            placeholder="https://your-worker.your-name.workers.dev"
          />
        </label>

        <label class="field key-field">
          <span id="authLabel">인증</span>
          <input
            id="apiKeyInput"
            type="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="Azure는 비워둡니다"
          />
        </label>

        <label class="field source-url-field">
          <span>나로우 URL</span>
          <input
            id="sourceUrlInput"
            type="url"
            autocomplete="off"
            spellcheck="false"
            placeholder="https://ncode.syosetu.com/n7031bs/"
          />
        </label>

        <label class="field">
          <span>원문</span>
          <select id="sourceLangInput">
            <option value="ja">일본어</option>
            <option value="en">영어</option>
            <option value="auto">자동 감지</option>
          </select>
        </label>

        <label class="field">
          <span>방식</span>
          <select id="routeInput">
            <option value="direct">바로 한국어</option>
            <option value="pivot">영어 경유</option>
          </select>
        </label>

        <label class="field small-field">
          <span>조각</span>
          <input id="chunkSizeInput" type="number" min="50" max="20000" step="100" />
        </label>

        <label class="field small-field">
          <span>요청</span>
          <input id="requestSizeInput" type="number" min="100" max="50000" step="500" />
        </label>

        <label class="field small-field">
          <span>대기</span>
          <input id="delayInput" type="number" min="0" max="5000" step="100" />
        </label>

        <div class="endpoint-check">
          <button class="button secondary-button" id="checkButton" type="button">
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M20 6 9 17l-5-5" />
            </svg>
            확인
          </button>
          <span id="languageText">Worker URL 필요</span>
        </div>

        <label class="field glossary-field">
          <span>용어집</span>
          <textarea
            id="glossaryInput"
            spellcheck="false"
            placeholder="岡村緋色 = 오카무라 히이로&#10;剣聖 = 검성"
          ></textarea>
        </label>
      </section>

      <section class="action-row" aria-label="번역 실행">
        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="stageText">원문 대기</span>
            <span id="progressText">0%</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>

        <div class="command-group">
          <button class="button secondary-button" id="fetchUrlButton" type="button">
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.2 1.2" />
              <path d="M14 11a5 5 0 0 0-7.1 0l-2 2A5 5 0 0 0 12 20.1l1.2-1.2" />
            </svg>
            URL
          </button>
          <button class="button secondary-button" id="loadButton" type="button">
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <path d="M17 8 12 3 7 8" />
              <path d="M12 3v12" />
            </svg>
            열기
          </button>
          <button class="button secondary-button" id="normalizeButton" type="button">
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M4 7h16" />
              <path d="M4 12h10" />
              <path d="M4 17h16" />
            </svg>
            정리
          </button>
          <button class="button primary-button" id="translateButton" type="button">
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="m5 3 14 9-14 9V3Z" />
            </svg>
            번역
          </button>
          <button class="button danger-button" id="cancelButton" type="button" disabled>
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
              <rect x="6" y="6" width="12" height="12" rx="1" />
            </svg>
            중지
          </button>
        </div>
      </section>

      <section class="workspace-grid">
        <article class="text-panel">
          <div class="panel-head">
            <div>
              <h2>원문</h2>
              <span id="sourceCount">0자</span>
            </div>
            <button class="icon-button" id="clearButton" type="button" aria-label="원문 삭제" title="원문 삭제">
              <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M3 6h18" />
                <path d="M8 6V4h8v2" />
                <path d="m19 6-1 14H6L5 6" />
                <path d="M10 11v6" />
                <path d="M14 11v6" />
              </svg>
            </button>
          </div>
          <textarea
            id="sourceText"
            class="text-box"
            spellcheck="false"
            placeholder="나로우 URL을 불러오거나 일본어 원문을 붙여넣으세요."
          ></textarea>
        </article>

        <article class="text-panel output-panel">
          <div class="panel-head">
            <div>
              <h2>한국어</h2>
              <span id="koreanCount">0자</span>
            </div>
            <div class="mini-actions">
              <button class="icon-button" id="copyButton" type="button" aria-label="번역문 복사" title="번역문 복사">
                <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
                  <rect x="9" y="9" width="13" height="13" rx="2" />
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
              </button>
              <button class="icon-button" id="downloadButton" type="button" aria-label="번역문 저장" title="번역문 저장">
                <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <path d="M7 10l5 5 5-5" />
                  <path d="M12 15V3" />
                </svg>
              </button>
            </div>
          </div>
          <textarea id="koreanText" class="text-box" lang="ko" spellcheck="false" readonly></textarea>
        </article>
      </section>

      <section class="log-panel" aria-label="진행 로그">
        <div class="panel-head compact-head">
          <div>
            <h2>로그</h2>
            <span id="chunkText">0개 조각</span>
          </div>
        </div>
        <ol id="logList" class="log-list" aria-live="polite"></ol>
      </section>
    </main>

    <input id="fileInput" type="file" accept=".txt,text/plain" hidden />
    <script src="app.js"></script>
  </body>
</html>
