<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Light Novel Translator</title>
    <meta
      name="description"
      content="Local Japanese and English light novel translator powered by Ollama"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span>文</span>
          </div>
          <div>
            <h1>로컬 라이트노벨 번역기</h1>
            <p>Ollama 모델로 일본어·영어 원문을 한국어 소설 문체로 번역</p>
          </div>
        </div>
        <div class="status-pill" aria-live="polite">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">확인 중</span>
        </div>
      </header>

      <section class="settings-panel" aria-label="번역 설정">
        <div class="capability-card" id="capabilityCard">
          <div>
            <span class="label-text">로컬 엔진</span>
            <strong id="engineText">Ollama 연결 확인 중</strong>
            <p id="engineHint">PC에서 실행 중인 Ollama 모델을 사용합니다.</p>
          </div>
          <button class="button secondary-button compact-button" id="checkButton" type="button">
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M20 6 9 17l-5-5" />
            </svg>
            확인
          </button>
        </div>

        <label class="field model-field">
          <span>모델</span>
          <input
            id="modelInput"
            type="text"
            autocomplete="off"
            spellcheck="false"
            list="modelList"
            placeholder="qwen3:8b"
          />
          <datalist id="modelList"></datalist>
        </label>

        <label class="field small-field">
          <span>청크</span>
          <input id="chunkSizeInput" type="number" min="500" max="8000" step="100" />
        </label>

        <label class="field small-field">
          <span>온도</span>
          <input id="temperatureInput" type="number" min="0" max="1.2" step="0.05" />
        </label>

        <label class="field glossary-field">
          <span>용어집</span>
          <textarea
            id="glossaryInput"
            spellcheck="false"
            placeholder="岡村緋色 = 오카무라 히이로&#10;剣聖 = 검성"
          ></textarea>
        </label>

        <label class="field prompt-field">
          <span>번역 프롬프트</span>
          <textarea id="promptInput" spellcheck="false"></textarea>
        </label>
      </section>

      <section class="action-row" aria-label="번역 실행">
        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="stageText">입력 대기</span>
            <span id="progressText">0%</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>

        <div class="command-group">
          <button class="button secondary-button" id="loadButton" type="button">
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <path d="M17 8 12 3 7 8" />
              <path d="M12 3v12" />
            </svg>
            불러오기
          </button>
          <button class="button primary-button" id="translateButton" type="button">
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="m5 3 14 9-14 9V3Z" />
            </svg>
            번역
          </button>
          <button class="button danger-button" id="cancelButton" type="button" disabled>
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
              <rect x="6" y="6" width="12" height="12" rx="1" />
            </svg>
            중지
          </button>
        </div>
      </section>

      <section class="workspace-grid">
        <article class="text-panel">
          <div class="panel-head">
            <div>
              <h2>원문</h2>
              <span id="sourceCount">0자</span>
            </div>
            <div class="mini-actions">
              <button class="icon-button" id="clearButton" type="button" aria-label="원문 지우기" title="원문 지우기">
                <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M3 6h18" />
                  <path d="M8 6V4h8v2" />
                  <path d="m19 6-1 14H6L5 6" />
                  <path d="M10 11v6" />
                  <path d="M14 11v6" />
                </svg>
              </button>
            </div>
          </div>
          <textarea
            id="sourceText"
            class="text-box"
            spellcheck="false"
            placeholder="일본어 또는 영어 원문을 붙여 넣어 주세요."
          ></textarea>
        </article>

        <article class="text-panel output-panel">
          <div class="panel-head">
            <div>
              <h2>한국어 번역</h2>
              <span id="koreanCount">0자</span>
            </div>
            <div class="mini-actions">
              <button class="icon-button" id="copyKoreanButton" type="button" aria-label="한국어 복사" title="한국어 복사">
                <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
                  <rect x="9" y="9" width="13" height="13" rx="2" />
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
              </button>
              <button class="icon-button" id="downloadButton" type="button" aria-label="한국어 저장" title="한국어 저장">
                <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <path d="M7 10l5 5 5-5" />
                  <path d="M12 15V3" />
                </svg>
              </button>
            </div>
          </div>
          <textarea
            id="koreanText"
            class="text-box"
            lang="ko"
            spellcheck="false"
            readonly
          ></textarea>
        </article>
      </section>

      <section class="log-panel" aria-label="진행 로그">
        <div class="panel-head compact-head">
          <div>
            <h2>로그</h2>
            <span id="chunkText">0개 청크</span>
          </div>
        </div>
        <ol id="logList" class="log-list" aria-live="polite"></ol>
      </section>
    </main>

    <input id="fileInput" type="file" accept=".txt,text/plain" hidden />
    <script src="app.js"></script>
  </body>
</html>
